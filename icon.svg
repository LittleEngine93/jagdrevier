<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#0f1a10"/>
  <!-- Outer circle -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="#c8a96e" stroke-width="14"/>
  <!-- Inner circle -->
  <circle cx="256" cy="256" r="40" fill="none" stroke="#c8a96e" stroke-width="10"/>
  <!-- Center dot -->
  <circle cx="256" cy="256" r="10" fill="#c8a96e"/>
  <!-- Crosshair lines -->
  <!-- Top -->
  <line x1="256" y1="60" x2="256" y2="190" stroke="#c8a96e" stroke-width="10" stroke-linecap="round"/>
  <!-- Bottom -->
  <line x1="256" y1="322" x2="256" y2="452" stroke="#c8a96e" stroke-width="10" stroke-linecap="round"/>
  <!-- Left -->
  <line x1="60" y1="256" x2="190" y2="256" stroke="#c8a96e" stroke-width="10" stroke-linecap="round"/>
  <!-- Right -->
  <line x1="322" y1="256" x2="452" y2="256" stroke="#c8a96e" stroke-width="10" stroke-linecap="round"/>
</svg>
